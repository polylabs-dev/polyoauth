[platform]
version = "0.12.0"
min_version = "0.12.0"

[component]
name = "polyoauth"
version = "0.2.0"
description = "PQ biometric SSO/identity provider — SPARK-based authentication, OAuth 2.0/OIDC/SAML 2.0, FIDO2/WebAuthn, RBAC"

[compiler]
target = ["wasm32-wasi", "native"]
optimization = "size"
strip = true

[stratum]
default_store = "kv"
graph_store = "csr"
dag_store = "merkle_csr"

[cortex]
default_alert_channel = "oauth-team"
anomaly_detection = true
drift_threshold = 0.10

[signing]
algorithm = "ml-dsa-87"
key_size = 4896
signature_size = 4627
pubkey_size = 2592

[scatter]
default_k = 3
default_n = 5
min_k = 3
max_n = 32
